  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FF00B2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 32px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Profile section */
    .profile-pic {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .profile-pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .username {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .bio {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.9;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.4;
    }

    /* Link buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .link-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 56px;
      border: 2px solid #ffffff;
      border-radius: 8px;
      background: transparent;
      color: #ffffff;
      text-decoration: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      position: relative;
      min-height: 56px;
      text-align: center;
    }

    .link-button:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .link-button:active {
      transform: scale(0.98);
    }

    /* Social icons */
    .socials {
      margin-top: 24px;
      display: flex;
      gap: 16px;
    }

    .social-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      transition: opacity 0.15s ease;
    }

    .social-icon:hover {
      opacity: 0.7;
    }

    .social-icon svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }


    /* Send Sol section */
    .sol-section {
      width: 100%;
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 16px 20px;
      text-align: center;
    }

    .sol-section .sol-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .sol-section .sol-address {
      font-size: 13px;
      opacity: 0.8;
      word-break: break-all;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 24px 16px 48px;
      }

      .link-button {
        padding: 14px 40px;
        font-size: 15px;
        min-height: 52px;
      }
    }
  </style>
</head>
